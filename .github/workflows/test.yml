name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv

  frontend-e2e:
    name: Frontend responsive e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Seed env from example
        # The Vite build needs VITE_CONTRACT_ADDRESS resolvable at module load.
        # CI doesn't talk to the contract; the example value is sufficient.
        run: cp .env.example .env

      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          npm run dev > /tmp/vite.log 2>&1 &
          echo $! > /tmp/vite.pid

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            if curl -sS -o /dev/null http://localhost:5173/; then
              echo "Dev server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Dev server failed to start"
          cat /tmp/vite.log
          exit 1

      - name: Run responsive driver
        run: npm run e2e:responsive

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-shots
          path: frontend/e2e/shots/
          if-no-files-found: ignore

      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/vite.pid ]; then
            kill "$(cat /tmp/vite.pid)" 2>/dev/null || true
          fi
