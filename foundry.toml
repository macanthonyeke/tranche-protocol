[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
# Tuned for deployed-bytecode size: TrancheProtocol sits near the EIP-170 24KB
# limit, so we optimize for code size (low runs) over runtime gas.
optimizer_runs = 1
via_ir = true

[invariant]
runs = 32
depth = 32

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
