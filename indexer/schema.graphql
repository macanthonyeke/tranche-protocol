# Tranche Protocol subgraph schema.
#
# milestoneCount is read via getEscrow() eth_call at EscrowCreated time.
# per-milestone `amount` is NOT emitted on-chain — always null; hydrate via
# getMilestones(escrowId) on the detail page.

enum EscrowState {
  ACTIVE
  COMPLETED
  CANCELLED
}

enum MilestoneState {
  PENDING
  FULFILLED
  DISPUTED
  RELEASED
  REFUNDED
}

type Escrow @entity(immutable: false) {
  "Escrow id as a decimal string"
  id: ID!
  escrowId: BigInt!
  depositor: Bytes!
  recipient: Bytes!

  "Single-recipient cross-chain payout target (bytes32 mintRecipient). Populated at create from getEscrow(); overwritten by ReceivingAddressUpdated. Null only if the create-time bind reverted."
  mintRecipient: Bytes
  "Single-recipient CCTP destination domain (26 = Arc / same-chain). Populated at create; overwritten by ReceivingAddressUpdated."
  destinationDomain: Int

  totalAmount: BigInt!
  invoiceHash: Bytes!
  invoiceURI: String!
  deadline: BigInt!

  "ACTIVE by default; CANCELLED on mutual cancel. COMPLETED is NOT derivable from events (no event) — hydrate on-chain if needed."
  state: EscrowState!

  "Captured from EscrowTermsSnapshotted (H-05)."
  protocolFeeBps: BigInt
  protocolTreasury: Bytes

  "Number of split recipients (from SplitsConfigured); 0 = single recipient."
  splitCount: Int!

  "Real value from getEscrow() eth_call at EscrowCreated; falls back to max(milestoneIndex seen)+1 for pre-fix escrows."
  milestoneCount: Int!
  releasedMilestoneCount: Int!
  refundedMilestoneCount: Int!
  "Count of milestones with a currently-OPEN dispute."
  disputedMilestoneCount: Int!
  "True while any milestone dispute is open — powers the arbiter panel filter."
  hasOpenDispute: Boolean!

  createdAt: BigInt!
  createdAtBlock: BigInt!
  createdTx: Bytes!
  updatedAt: BigInt!

  "Raw invoice JSON string from InvoiceSnapshotted. Empty string if the depositor passed no data."
  invoiceData: String
  "Parsed invoice number from the invoiceData JSON (invoiceNumber field). Null if absent or unparseable."
  invoiceNumber: String
  "Milestone titles derived from invoiceData JSON lineItems[].title. Empty array if not provided."
  titles: [String!]!

  "Timestamp the recipient acknowledged the invoice on-chain (InvoiceAcknowledged). Null until acknowledged."
  invoiceAcknowledgedAt: BigInt
  "Address that emitted InvoiceAcknowledged. Null until acknowledged."
  invoiceAcknowledgedBy: Bytes

  milestones: [Milestone!]! @derivedFrom(field: "escrow")
  splits: [Split!]! @derivedFrom(field: "escrow")
  disputes: [Dispute!]! @derivedFrom(field: "escrow")
  refundCredits: [RefundCredit!]! @derivedFrom(field: "escrow")
  crossChainCredits: [CrossChainLegCredit!]! @derivedFrom(field: "escrow")
  evidenceEntries: [EvidenceEntry!]! @derivedFrom(field: "escrow")
}

type Milestone @entity(immutable: false) {
  "escrowId-milestoneIndex"
  id: ID!
  escrow: Escrow!
  index: Int!
  state: MilestoneState!

  "NOT emitted on-chain — always null. Hydrate via getMilestones(escrowId) on the detail page."
  amount: BigInt

  "Review window deadline from DeliveryClaimed (block.timestamp + reviewWindow)."
  reviewDeadline: BigInt
  "Timestamp the recipient claimed delivery (DeliveryClaimed)."
  deliveredAt: BigInt

  "Recipient basis points the milestone settled at (resolution / timeout default / mutual)."
  resolutionBps: BigInt
  resolutionURI: String
  resolutionHash: Bytes
  "APPROVED | RELEASED_NO_DISPUTE | DISPUTE_RESOLVED | DISPUTE_TIMEOUT | MUTUAL_SETTLEMENT | REFUNDED_AFTER_DEADLINE | MILESTONE_CANCELLED | null"
  settledVia: String

  dispute: Dispute
  updatedAt: BigInt!
}

type Dispute @entity(immutable: false) {
  "escrowId-milestoneIndex (one dispute record per milestone)"
  id: ID!
  escrow: Escrow!
  milestone: Milestone!
  milestoneIndex: Int!

  raisedBy: Bytes!
  isEscalation: Boolean!
  reason: String
  evidenceHash: Bytes
  counteredBy: Bytes
  counterEvidenceHash: Bytes

  raisedAt: BigInt!
  raisedTx: Bytes!

  resolved: Boolean!
  resolvedAt: BigInt
  "Recipient bps (resolution) / defaultBps (timeout) / agreed bps (mutual)."
  resolutionBps: BigInt
  resolutionURI: String
  resolutionHash: Bytes
  "RESOLVED | TIMED_OUT | MUTUAL_SETTLED | null"
  resolutionType: String
}

type Split @entity(immutable: false) {
  "escrowId-index"
  id: ID!
  escrow: Escrow!
  index: Int!
  mintRecipient: Bytes!
  destinationDomain: Int!
  bps: BigInt!
}

"Running per-wallet refund credit balance, mirrored from credit / transfer / withdraw events. On-chain getRefundBalance(addr) remains the source of truth (it is O(1))."
type RefundBalance @entity(immutable: false) {
  "wallet address, lowercased"
  id: ID!
  wallet: Bytes!
  balance: BigInt!
  totalCredited: BigInt!
  totalWithdrawn: BigInt!
  updatedAt: BigInt!
}

"Immutable ledger of evidence appended to a disputed milestone (EvidenceAppended). Ordered by timestamp ascending."
type EvidenceEntry @entity(immutable: true) {
  "txHash-logIndex"
  id: ID!
  escrow: Escrow!
  milestoneIndex: Int!
  caller: Bytes!
  hash: Bytes!
  uri: String!
  timestamp: BigInt!
  tx: Bytes!
}


"Immutable ledger of cross-chain legs diverted to an Arc refund credit (CrossChainLegCreditedOnArc — Finding 3 / SE-3). Append-only; powers the 'small leg credited on Arc, withdraw here' UI."
type CrossChainLegCredit @entity(immutable: true) {
  "txHash-logIndex"
  id: ID!
  escrow: Escrow!
  escrowId: BigInt!
  milestoneIndex: Int!
  creditedTo: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

"Immutable ledger of partial refund credits (PartialRefundCredited)."
type RefundCredit @entity(immutable: true) {
  "txHash-logIndex"
  id: ID!
  escrow: Escrow!
  milestoneIndex: Int!
  refundTo: Bytes!
  amount: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

"Immutable record of each InvoiceURIUpdated event. Ordered by timestamp ascending."
type InvoiceURIUpdate @entity(immutable: true) {
  "txHash-logIndex"
  id: ID!
  escrowId: BigInt!
  oldURI: String!
  newURI: String!
  timestamp: BigInt!
  blockNumber: BigInt!
}
